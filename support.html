    :root {
      --bg: #f7efe6;

      --text: #171417;
      --muted: #5f5852;
      --accent: #ff6d4f;
      --accent-soft: #ffe2d8;
      --border: #e7d6c7;
      --dark: #1c191d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #fff8ef 0%, var(--bg) 52%);
      color: var(--text);
      font: 16px/1.7 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }
    .wrap { max-width: 1020px; margin: 0 auto; padding: 36px 20px 80px; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand { font-weight: 800; }
    select {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font: inherit;
    }
    .hero, .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(25, 18, 16, 0.08);
    }
    .hero { padding: 32px; margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .card { padding: 24px; }
    .dark {
      background: linear-gradient(135deg, #231f26, var(--dark));
      color: white;
    }
    .dark p, .dark li, .dark a { color: rgba(255,255,255,0.84); }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #a44530;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1, h2, h3 { margin: 0 0 12px; line-height: 1.15; }
    h1 { font-size: 38px; }
    h2 { font-size: 22px; }
    p, li { color: var(--muted); }
    ul { margin: 0; padding-left: 20px; }
    a { color: #b64e37; }
  </style>

    const langSelect = document.getElementById("lang");
    const supported = Object.keys(t);
    const browserLang = navigator.language.startsWith("zh-CN") ? "zh-Hans"
      : navigator.language.startsWith("zh-TW") || navigator.language.startsWith("zh-HK") ? "zh-Hant"
      : supported.find((key) => navigator.language.startsWith(key)) || "en";

    supported.forEach((key) => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = t[key].lang;
      langSelect.appendChild(option);
    });

    function render(lang) {
      const x = t[lang] || t.en;
      document.documentElement.lang = lang;
      document.title = `${x.title} - Cutout Magic`;
      document.getElementById("support-pill").textContent = x.pill;
      document.getElementById("title").textContent = x.title;
      document.getElementById("hero-body").textContent = x.hero;
      document.getElementById("contact-title").textContent = x.contactTitle;
      document.getElementById("contact-body").innerHTML = x.contactBody;
      document.getElementById("response-time").textContent = x.responseTime;
      document.getElementById("purchase-title").textContent = x.purchaseTitle;
      document.getElementById("purchase-body").textContent = x.purchaseBody;
      document.getElementById("faq-title").textContent = x.faqTitle;
      document.getElementById("troubleshooting-title").textContent = x.troubleshootingTitle;

      const purchaseList = document.getElementById("purchase-list");
      purchaseList.innerHTML = "";
      x.purchaseList.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        purchaseList.appendChild(li);
      });

      const faqList = document.getElementById("faq-list");
      faqList.innerHTML = "";
      x.faqs.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        faqList.appendChild(li);
      });

      const troubleshootingList = document.getElementById("troubleshooting-list");
      troubleshootingList.innerHTML = "";
      x.troubleshooting.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        troubleshootingList.appendChild(li);
      });
    }

    langSelect.value = browserLang;
    render(browserLang);
    langSelect.addEventListener("change", (event) => render(event.target.value));
