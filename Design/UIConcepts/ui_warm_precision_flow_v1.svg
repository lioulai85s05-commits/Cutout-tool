<svg width="1800" height="1560" viewBox="0 0 1800 1560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="112" y1="94" x2="1690" y2="1488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7F0"/>
      <stop offset="0.55" stop-color="#FFF2E7"/>
      <stop offset="1" stop-color="#F3E1D3"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="280" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23262C"/>
      <stop offset="1" stop-color="#0B0C0E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="220" y2="76" gradientUnits="userSpaceOnUse">
