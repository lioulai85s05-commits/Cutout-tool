  <rect width="1800" height="1560" rx="56" fill="url(#pageBg)"/>

  <text x="96" y="110" fill="#171412" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="700">Warm Precision UI · Flow Preview</text>
  <text x="96" y="158" fill="#6D625A" font-family="Helvetica, Arial, sans-serif" font-size="24">Upload → Recognize → Select → Extract → Save. Object Ring color logic applied across the full app shell.</text>

