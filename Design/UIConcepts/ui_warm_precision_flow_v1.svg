    <text x="58" y="374" fill="#F5D8CD" font-family="Helvetica, Arial, sans-serif" font-size="16">Scan the photo first, then let the</text>
    <text x="58" y="396" fill="#F5D8CD" font-family="Helvetica, Arial, sans-serif" font-size="16">user confirm the object to isolate.</text>
