    <text x="58" y="182" fill="#171412" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">Choose clearly.</text>
    <text x="58" y="216" fill="#171412" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">Cut out fast.</text>
    <text x="58" y="248" fill="#6D625A" font-family="Helvetica, Arial, sans-serif" font-size="16">Warm shell outside. Precision inside.</text>
    <circle cx="278" cy="206" r="34" stroke="#E3D0C0" stroke-width="12"/>
    <circle cx="278" cy="206" r="18" fill="#171412"/>
    <circle cx="302" cy="226" r="12" fill="#FF8F69"/>

    <rect x="40" y="300" width="280" height="190" rx="28" fill="url(#darkPanel)"/>
