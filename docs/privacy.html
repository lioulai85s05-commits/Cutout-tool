      --accent: #ff6d4f;

      --border: #e7d6c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #fff8ef 0%, var(--bg) 52%);
      color: var(--text);
      font: 16px/1.7 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;

    .wrap { max-width: 980px; margin: 0 auto; padding: 36px 20px 80px; }

    p, li { color: var(--muted); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand { font-weight: 800; }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #a44530;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    select {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font: inherit;
    }
    .meta {
      color: #8c8178;
      font-size: 14px;
      margin-bottom: 12px;
    }
    ul { padding-left: 20px; }
  </style>
</head>

    const langSelect = document.getElementById("lang");
    const supported = Object.keys(translations);
    const browserLang = navigator.language.startsWith("zh-CN") ? "zh-Hans"
      : navigator.language.startsWith("zh-TW") || navigator.language.startsWith("zh-HK") ? "zh-Hant"
      : supported.find((key) => navigator.language.startsWith(key)) || "en";

    supported.forEach((key) => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = translations[key].lang;
      langSelect.appendChild(option);
    });

    function render(lang) {
      const t = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      document.title = `${t.title} - Cutout Magic`;
      document.getElementById("policy-pill").textContent = t.pill;
      document.getElementById("title").textContent = t.title;
      document.getElementById("effective-date").textContent = t.effectiveDate;
      document.getElementById("intro").textContent = t.intro;
      document.getElementById("contact-title").textContent = t.contactTitle;
      document.getElementById("contact-body").innerHTML = t.contactBody;

      const sections = document.getElementById("sections");
      sections.innerHTML = "";
      t.sections.forEach(([title, body]) => {
        const h2 = document.createElement("h2");
        h2.textContent = title;
        const p = document.createElement("p");
        p.textContent = body;
        sections.appendChild(h2);
        sections.appendChild(p);
      });
    }

    langSelect.value = browserLang;
    render(browserLang);
    langSelect.addEventListener("change", (event) => render(event.target.value));
  </script>
